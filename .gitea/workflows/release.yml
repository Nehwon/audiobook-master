name: 🚀 Release & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: gitea.lamachere.fr
  IMAGE_NAME: audiobook-manager-pro

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🏷️ Extract Version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        
    - name: 📋 Generate Changelog
      id: changelog
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        echo "## 🎧 Audiobook Manager Pro v$VERSION" > CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "### 🚀 Nouvelles fonctionnalités" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "- 🐳 Dockerisation complète avec Docker Compose" >> CHANGELOG.md
        echo "- 🖥️ Interface graphique desktop multi-plateforme" >> CHANGELOG.md
        echo "- 🔗 Intégration Audiobookshelf complète" >> CHANGELOG.md
        echo "- 📦 Installation one-click automatisée" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "### 🔧 Améliorations" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "- ⚡ Optimisation multithreading CPU" >> CHANGELOG.md
        echo "- 🛡️ Sécurité renforcée avec scans automatiques" >> CHANGELOG.md
        echo "- 📊 Monitoring et métriques avancées" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "### 🐛 Corrections" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "- Correction des bugs critiques" >> CHANGELOG.md
        echo "- Stabilité améliorée" >> CHANGELOG.md
        echo "- Performance optimisée" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "### 📦 Installation" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "\`\`\`bash" >> CHANGELOG.md
        echo "curl -fsSL https://raw.githubusercontent.com/fabrice-audiobook/audiobooks-manager/v$VERSION/scripts/install.sh | bash" >> CHANGELOG.md
        echo "\`\`\`" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "### 🐳 Docker" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "\`\`\`bash" >> CHANGELOG.md
        echo "docker-compose up -d" >> CHANGELOG.md
        echo "\`\`\`" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "---" >> CHANGELOG.md
        echo "*Pour voir toutes les modifications, consultez le [CHANGELOG complet](https://github.com/fabrice-audiobook/audiobooks-manager/blob/main/CHANGELOG.md)*" >> CHANGELOG.md
        
        # Sauvegarder le changelog
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat CHANGELOG.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: 🚀 Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        release_name: 🎧 Audiobook Manager Pro v${{ steps.version.outputs.version }}
        body: ${{ steps.changelog.outputs.changelog }}
        draft: false
        prerelease: ${{ github.event.inputs.prerelease || 'false' }}
        
    - name: 📤 Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./CHANGELOG.md
        asset_name: CHANGELOG-v${{ steps.version.outputs.version }}.md
        asset_content_type: text/markdown

  build-and-publish:
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            suffix: linux-x64
          - os: windows-latest
            platform: windows/amd64
            suffix: windows-x64.exe
          - os: macos-latest
            platform: darwin/amd64
            suffix: macos-x64
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install Build Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller wheel
        
    - name: 🏷️ Get Version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: 🐧 Build Application
      run: |
        python scripts/package.py --all
        
    - name: 📦 Package Application
      run: |
        mkdir -p dist-package
        
        if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
          # Linux - Créer AppImage
          tar -czf dist-package/AudiobookManagerPro-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.tar.gz -C dist .
        elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          # Windows - Créer ZIP
          cd dist
          7z a -tzip ../dist-package/AudiobookManagerPro-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.zip *
          cd ..
        elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
          # macOS - Créer DMG
          hdiutil create -volname "Audiobook Manager Pro" -srcfolder dist -ov -format UDZO dist-package/AudiobookManagerPro-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.dmg
        fi
        
    - name: 📤 Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: dist-package/AudiobookManagerPro-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.tar.gz
        asset_name: AudiobookManagerPro-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.tar.gz
        asset_content_type: application/gzip
        
    - name: 📤 Upload Release Asset (Windows)
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: dist-package/AudiobookManagerPro-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.zip
        asset_name: AudiobookManagerPro-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.zip
        asset_content_type: application/zip
        
    - name: 📤 Upload Release Asset (macOS)
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: dist-package/AudiobookManagerPro-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.dmg
        asset_name: AudiobookManagerPro-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.dmg
        asset_content_type: application/x-apple-diskimage

  deploy-docker-hub:
    runs-on: ubuntu-latest
    needs: create-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🏷️ Get Version
      id: version
      run: |
        VERSION="${{ github.ref_name }}"
        VERSION="${VERSION#v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: 🔐 Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: 🐳 Build and Push to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          fabriceaudiobook/audiobook-manager-pro:latest
          fabriceaudiobook/audiobook-manager-pro:${{ steps.version.outputs.version }}
        labels: |
          org.opencontainers.image.title=Audiobook Manager Pro
          org.opencontainers.image.description=Système de traitement d'audiobooks avec multithreading CPU optimisé
          org.opencontainers.image.version=${{ steps.version.outputs.version }}
          org.opencontainers.image.licenses=MIT
        build-args: |
          VERSION=${{ steps.version.outputs.version }}

  update-documentation:
    runs-on: ubuntu-latest
    needs: [create-release, build-and-publish]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🏷️ Get Version
      id: version
      run: |
        VERSION="${{ github.ref_name }}"
        VERSION="${VERSION#v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: 📝 Update Documentation
      run: |
        # Mettre à jour la version dans les fichiers
        sed -i "s/version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" core/__init__.py
        sed -i "s/## \[Unreleased\]/## [${{ steps.version.outputs.version }}] - $(date +'%Y-%m-%d')/" CHANGELOG.md
        
        # Commit et push des changements
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add core/__init__.py CHANGELOG.md
        git commit -m "📝 Update version to ${{ steps.version.outputs.version }}"
        git push