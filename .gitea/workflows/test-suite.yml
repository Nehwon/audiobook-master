name: 🧪 Test Suite

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: 📦 Cache Dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock pytest-xvfb
        
    - name: 🧪 Run Unit Tests
      run: |
        pytest tests/ \
          --cov=core \
          --cov=web \
          --cov=integrations \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --junitxml=test-results.xml \
          -v
          
    - name: 📊 Upload Coverage Reports
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        
    - name: 📤 Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          test-results.xml
          htmlcov/
          
    - name: 🧪 Publish Test Results
      uses: dorny/test-reporter@v1
      if: matrix.python-version == '3.11'
      with:
        name: Unit Tests
        path: test-results.xml
        reporter: java-junit

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      # Mock Audiobookshelf pour tests
      mock-audiobookshelf:
        image: nginx:alpine
        ports:
          - 13378:80
        options: >-
          --health-cmd "curl -f http://localhost/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-mock requests-mock
        
    - name: 🧪 Run Integration Tests
      env:
        AUDIOBOOKSHELF_HOST: localhost
        AUDIOBOOKSHELF_PORT: 13378
        AUDIOBOOKSHELF_USERNAME: testuser
        AUDIOBOOKSHELF_PASSWORD: testpass
      run: |
        pytest tests/integration/ \
          --junitxml=integration-test-results.xml \
          -v \
          --tb=short || true
          
    - name: 📤 Upload Integration Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: integration-test-results.xml

  security-scan:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🔍 Run Bandit Security Scan
      run: |
        pip install bandit[toml]
        bandit -r core/ web/ integrations/ \
          -f json \
          -o bandit-report.json \
          || true
          
    - name: 🔍 Run Safety Check
      run: |
        pip install safety
        safety check --json --output safety-report.json || true
        
    - name: 📤 Upload Security Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  code-quality:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🔍 Run Code Quality Checks
      run: |
        pip install flake8 black isort mypy
        # Flake8
        flake8 core/ web/ integrations/ --format=json --output-file=flake8-report.json || true
        # Black formatting check
        black --check --diff core/ web/ integrations/ || true
        # Import sorting check
        isort --check-only --diff core/ web/ integrations/ || true
        # Type checking
        mypy core/ --junit-xml mypy-report.xml || true
        
    - name: 📤 Upload Code Quality Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-quality-reports
        path: |
          flake8-report.json
          mypy-report.xml

  performance-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-benchmark memory-profiler
        
    - name: 🧪 Run Performance Tests
      run: |
        pytest tests/performance/ \
          --benchmark-only \
          --benchmark-json=benchmark-report.json \
          -v || true
          
    - name: 📊 Benchmark Comparison
      run: |
        pip install pytest-benchmark[histogram]
        pytest-benchmark compare benchmark-report.json \
          https://github.com/fabrice-audiobook/audiobooks-manager/releases/latest/download/benchmark-report.json || true
          
    - name: 📤 Upload Performance Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-reports
        path: benchmark-report.json

  test-summary:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-scan, code-quality]
    if: always()
    
    steps:
    - name: 📊 Generate Test Summary
      run: |
        echo "## 🧪 Test Suite Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Overall | ${{ needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success' && needs.security-scan.result == 'success' && needs.code-quality.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY