services:
  # 🌐 Application Web Audiobook Manager
  audiobook-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audiobook-manager-pro
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 📁 Volumes de données
      - ./data/source:/app/data/source
      - ./data/output:/app/data/output
      - /tmp:/tmp
      - ./logs:/app/logs
      # 🔧 Configuration locale (optionnel)
      - ./core/config.py:/app/core/config.py:ro
    environment:
      # 🌐 Configuration Web
      - FLASK_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
      - APP_PORT=5001
      
      # 🚀 Performance
      - GUNICORN_WORKERS=4
      - GUNICORN_THREADS=8
      - GUNICORN_TIMEOUT=300
      
      # 📁 Répertoires
      - SOURCE_DIR=/app/data/source
      - OUTPUT_DIR=/app/data/output
      - TEMP_DIR=/tmp/audiobooks_web
      
      # 📊 Logging
      - LOG_LEVEL=INFO
      
      # 🖥️ Configuration CPU (adapter selon votre système)
      - MAX_WORKERS=32
      - CPU_THREADS=16
      - BATCH_THREADS=8
      
    networks:
      - audiobook-network
      
    # 🏥 Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      
    # 📊 Limites de ressources (adapter selon votre système)
    deploy:
      resources:
        limits:
          cpus: '16'        # Adapter selon votre CPU
          memory: 8G         # Adapter selon votre RAM
        reservations:
          cpus: '4'
          memory: 2G

  # 📊 Monitoring optionnel avec Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: audiobook-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - audiobook-network
    profiles:
      - monitoring

  # 📈 Dashboard Grafana optionnel
  grafana:
    image: grafana/grafana:latest
    container_name: audiobook-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - audiobook-network
    profiles:
      - monitoring

  # 🗄️ Base de données optionnelle (pour futures fonctionnalités)
  postgres:
    image: postgres:15-alpine
    container_name: audiobook-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_DB=audiobook_manager
      - POSTGRES_USER=audiobook
      - POSTGRES_PASSWORD=audiobook123
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    networks:
      - audiobook-network
    profiles:
      - database

  # 🔄 Redis pour le cache et les queues
  redis:
    image: redis:7-alpine
    container_name: audiobook-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - audiobook-network
    profiles:
      - cache

# 🌐 Réseau partagé
networks:
  audiobook-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 📁 Volumes persistants
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local