<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Manager - Encodage M4B</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body class="bg-gray-100 text-gray-900">
    <header class="bg-indigo-600 text-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold">Audiobook Manager</h1>
                <p class="text-sm opacity-90">Tableau des dossiers à encoder en M4B</p>
            </div>
            <div class="text-right">
                <p class="text-sm">Statut</p>
                <p id="status-text" class="font-semibold">Prêt</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
        <section class="bg-white rounded shadow p-4">
            <h2 class="text-lg font-semibold mb-3">Options d'encodage</h2>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                <div>
                    <label class="block text-sm mb-1">Bitrate</label>
                    <select id="bitrate" class="w-full border rounded px-2 py-1">
                        <option value="64k">64k</option>
                        <option value="96k">96k</option>
                        <option value="128k" selected>128k</option>
                        <option value="192k">192k</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm mb-1">Sample rate</label>
                    <select id="samplerate" class="w-full border rounded px-2 py-1">
                        <option value="22050">22050</option>
                        <option value="44100" selected>44100</option>
                        <option value="48000">48000</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm mb-1">Mode</label>
                    <select id="processing-mode" class="w-full border rounded px-2 py-1">
                        <option value="concat_fast">Phase 1 - concat</option>
                        <option value="encode_aac" selected>Phase 2 - AAC</option>
                        <option value="final_m4b">Phase 3 - final</option>
                    </select>
                </div>
                <label class="flex items-center space-x-2 mt-6 md:mt-0"><input id="no-gpu" type="checkbox"><span>Sans GPU</span></label>
                <label class="flex items-center space-x-2 mt-6 md:mt-0"><input id="no-normalization" type="checkbox"><span>Sans normalisation</span></label>
            </div>
        </section>

        <section class="bg-white rounded shadow p-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-semibold">Dossiers source à encoder</h2>
                <button onclick="loadSourceFolders()" class="bg-gray-700 text-white px-3 py-1 rounded">Rafraîchir</button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm" id="folders-table">
                    <thead>
                        <tr class="text-left border-b">
                            <th class="py-2 pr-4">Dossier</th>
                            <th class="py-2 pr-4">Fichiers audio</th>
                            <th class="py-2 pr-4">Taille</th>
                            <th class="py-2 pr-4">Modifié le</th>
                            <th class="py-2">Action</th>
                        </tr>
                    </thead>
                    <tbody id="folders-table-body"></tbody>
                </table>
            </div>
        </section>

        <section class="bg-white rounded shadow p-4">
            <h2 class="text-lg font-semibold mb-3">Sorties M4B</h2>
            <ul id="output-files" class="space-y-2"></ul>
        </section>
    </main>

    <script>
        const socket = io();
        let currentStatus = 'idle';

        function getOptions() {
            return {
                bitrate: document.getElementById('bitrate').value,
                samplerate: parseInt(document.getElementById('samplerate').value, 10),
                processing_mode: document.getElementById('processing-mode').value,
                no_gpu: document.getElementById('no-gpu').checked,
                no_normalization: document.getElementById('no-normalization').checked,
                no_compression: false
            };
        }

        function updateStatus(status) {
            currentStatus = status.status;
            const labels = {
                idle: 'Prêt',
                processing: `Encodage en cours (${status.current_file || ''})`,
                completed: 'Terminé',
                error: `Erreur: ${status.error || ''}`,
                stopped: 'Arrêté'
            };
            document.getElementById('status-text').textContent = labels[status.status] || status.status;
        }

        async function loadSourceFolders() {
            const res = await fetch('/api/folders');
            const folders = await res.json();
            const body = document.getElementById('folders-table-body');
            body.innerHTML = '';

            if (!folders.length) {
                body.innerHTML = '<tr><td colspan="5" class="py-4 text-gray-500">Aucun dossier audio détecté</td></tr>';
                return;
            }

            folders.forEach(folder => {
                const tr = document.createElement('tr');
                tr.className = 'border-b';
                const modified = new Date(folder.modified * 1000).toLocaleString();
                const sizeMb = (folder.size / 1024 / 1024).toFixed(1);
                tr.innerHTML = `
                    <td class="py-2 pr-4 font-medium">${folder.name}</td>
                    <td class="py-2 pr-4">${folder.audio_count}</td>
                    <td class="py-2 pr-4">${sizeMb} MB</td>
                    <td class="py-2 pr-4">${modified}</td>
                    <td class="py-2">
                        <button class="bg-indigo-600 text-white px-3 py-1 rounded disabled:opacity-50" ${currentStatus === 'processing' ? 'disabled' : ''} onclick="startEncoding('${folder.name.replace(/'/g, "\\'")}')">
                            Encoder en M4B
                        </button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        async function startEncoding(folderName) {
            if (currentStatus === 'processing') {
                alert('Un encodage est déjà en cours.');
                return;
            }
            const res = await fetch('/api/convert', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ folder: folderName, options: getOptions() })
            });

            if (!res.ok) {
                const err = await res.json();
                alert(err.error || 'Erreur lors du lancement de l\'encodage');
                return;
            }

            await loadSourceFolders();
        }

        async function loadOutputFiles() {
            const res = await fetch('/api/outputs');
            const files = await res.json();
            const container = document.getElementById('output-files');
            container.innerHTML = '';

            if (!files.length) {
                container.innerHTML = '<li class="text-gray-500">Aucun M4B produit pour le moment.</li>';
                return;
            }

            files.forEach(file => {
                const sizeMb = (file.size / 1024 / 1024).toFixed(1);
                container.innerHTML += `<li class="border rounded p-2 flex justify-between"><span>${file.name} (${sizeMb} MB)</span><a class="text-indigo-700" href="/api/download/${file.name}">Télécharger</a></li>`;
            });
        }

        socket.on('status_update', (status) => {
            updateStatus(status);
            loadSourceFolders();
            if (status.status === 'completed') {
                loadOutputFiles();
            }
        });
        socket.on('conversion_complete', () => loadOutputFiles());
        socket.on('conversion_error', (data) => alert(data.error));

        loadSourceFolders();
        loadOutputFiles();
        fetch('/api/status').then(r => r.json()).then(updateStatus);
    </script>
</body>
</html>
