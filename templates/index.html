<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Manager - Nginx UI</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #d1d5db;
            --primary: #4f46e5;
            --danger: #b91c1c;
        }
        body.dark {
            --bg: #0b1020;
            --card: #172036;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: #334155;
            --primary: #818cf8;
            --danger: #ef4444;
        }
        body { font-family: Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; display:flex; justify-content:space-between; align-items:center; }
        .tabs { display:flex; gap:8px; padding: 10px 20px; flex-wrap:wrap; }
        .tab { border:1px solid var(--border); background:var(--card); color:var(--text); padding:8px 12px; border-radius:8px; cursor:pointer; }
        .tab.active { background:var(--primary); color:white; border-color:var(--primary); }
        main { padding: 0 20px 20px; }
        .page { display:none; }
        .page.active { display:block; }
        .card { background: var(--card); border:1px solid var(--border); border-radius:10px; padding: 14px; margin-bottom: 14px; }
        table { width:100%; border-collapse: collapse; }
        th, td { border-bottom:1px solid var(--border); text-align:left; padding:8px; }
        button { background: var(--primary); color:white; border:none; border-radius:6px; padding: 6px 10px; cursor:pointer; }
        button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
        button.danger { background: var(--danger); }
        button:disabled { opacity: 0.55; cursor: not-allowed; }
        .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        input, select { background: var(--bg); color: var(--text); border:1px solid var(--border); border-radius:6px; padding:7px; }
        .muted { color: var(--muted); }
        .pill { border:1px solid var(--border); border-radius:999px; padding:2px 8px; font-size:12px; }
        audio { width:100%; max-width: 300px; }
    </style>
</head>
<body>
<header>
    <div>
        <strong>Audiobook Manager</strong><br>
        <span class="muted">Interface HTML/CSS servie via Nginx</span>
    </div>
    <label class="row">🌗 Theme <input id="themeSwitch" type="checkbox"></label>
</header>
<div class="tabs">
    <button class="tab active" data-page="library">Bibliothèque</button>
    <button class="tab" data-page="processing">Traitements</button>
    <button class="tab" data-page="review">Attente suppression/retraitement</button>
    <button class="tab" data-page="config">Configuration</button>
</div>
<main>
    <section id="page-library" class="page active">
        <div class="card">
            <div class="row">
                <button onclick="loadLibrary()">Rafraîchir</button>
                <button class="secondary" onclick="extractSelected()">Décompresser sélection</button>
                <label><input id="deleteArchiveAfter" type="checkbox"> Supprimer archive après extraction</label>
                <button id="renameSelectedBtn" class="secondary" onclick="renameSelected()">Renommage batch</button>
                <button onclick="enqueueSelected()">Ajouter sélection à la queue M4B</button>
            </div>
        </div>
        <div class="card">
            <h3>Dossiers dans /app/data/source</h3>
            <table>
                <thead><tr><th></th><th>Nom</th><th>Fichiers audio</th><th>Taille MB</th><th>Actions</th></tr></thead>
                <tbody id="foldersBody"></tbody>
            </table>
        </div>
        <div class="card">
            <h3>Archives à la racine /app/data/source</h3>
            <table>
                <thead><tr><th></th><th>Archive</th><th>Taille MB</th></tr></thead>
                <tbody id="archivesBody"></tbody>
            </table>
        </div>
    </section>

    <section id="page-processing" class="page">
        <div class="card"><button onclick="loadJobs()">Rafraîchir statuts</button></div>
        <div class="card"><h3>En attente</h3><div id="pendingList"></div></div>
        <div class="card"><h3>En cours</h3><div id="runningList"></div></div>
        <div class="card"><h3>Terminés</h3><div id="doneList"></div></div>
    </section>

    <section id="page-review" class="page">
        <div class="card"><h3>Dossiers traités en attente d'action</h3><div id="reviewList"></div></div>
    </section>

    <section id="page-config" class="page">
        <div class="card">
            <h3>Paramètres d'encodage</h3>
            <div class="row">
                <label>Bitrate <select id="cfgBitrate"><option>64k</option><option>96k</option><option selected>128k</option><option>192k</option></select></label>
                <label>Sample rate <select id="cfgRate"><option value="22050">22050</option><option value="44100" selected>44100</option><option value="48000">48000</option></select></label>
                <label>Mode <select id="cfgMode"><option value="concat_fast">concat_fast</option><option value="encode_aac">encode_aac</option><option value="final_m4b" selected>final_m4b</option></select></label>
                <label><input id="cfgGpu" type="checkbox" checked> GPU</label>
                <label><input id="cfgLoud" type="checkbox" checked> Loudnorm</label>
                <label><input id="cfgComp" type="checkbox" checked> Compresseur</label>
                <label><input id="cfgAutoExtract" type="checkbox"> Auto-décompresser les archives</label>
                <button onclick="saveConfig()">Sauvegarder</button>
            </div>
        </div>
    </section>
</main>

<script>
let libraryCache = { folders: [], archives: [] };
let renameInProgress = false;

function setRenameBusy(isBusy){
    renameInProgress = isBusy;
    const batchBtn = document.getElementById('renameSelectedBtn');
    if (batchBtn) {
        batchBtn.disabled = isBusy;
        batchBtn.textContent = isBusy ? 'Renommage...' : 'Renommage batch';
    }
    document.querySelectorAll('[data-rename-btn="1"]').forEach(btn => {
        btn.disabled = isBusy;
        btn.textContent = isBusy ? 'Renommage...' : 'Renommer';
    });
}

function fmtMb(v){ return (v/1024/1024).toFixed(1); }
function selectedValues(name){ return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(i => i.value); }

async function api(url, options={}) {
    const r = await fetch(url, { headers: {'Content-Type':'application/json'}, ...options });
    const raw = await r.text();
    let data = null;
    try { data = raw ? JSON.parse(raw) : null; }
    catch (_) { data = null; }

    if (!r.ok) {
        const msg = data?.error || `Erreur API (${r.status})`;
        throw new Error(msg);
    }
    if (!data) throw new Error('Réponse API invalide (JSON attendu)');
    return data;
}

async function loadLibrary() {
    const data = await api('/api/library');
    libraryCache = data;
    const fb = document.getElementById('foldersBody');
    const ab = document.getElementById('archivesBody');
    fb.innerHTML = '';
    ab.innerHTML = '';

    data.folders.forEach(f => {
        const issues = (f.issues || []).length
            ? `<div class="muted" style="font-size:12px">⚠️ ${(f.issues || []).join(' | ')}${f.suggest_delete ? ' — suppression suggérée' : ''}</div>`
            : '';
        fb.innerHTML += `<tr>
            <td><input type="checkbox" name="folderSel" value="${f.name}"></td>
            <td>${f.name}${issues}</td>
            <td>${f.audio_count} / ${f.file_count ?? '-'}</td>
            <td>${fmtMb(f.size)}</td>
            <td>
                <button data-rename-btn="1" class="secondary" ${renameInProgress ? 'disabled' : ''} onclick="renameOne('${f.name.replaceAll("'", "\\'")}')">${renameInProgress ? 'Renommage...' : 'Renommer'}</button>
                ${f.can_ignore ? `<button class="secondary" onclick="ignoreOne('${f.name.replaceAll("'", "\\'")}')">Ignorer</button>` : ''}
                ${f.suggest_delete ? `<button class="danger" onclick="deleteSuspectFolder('${f.name.replaceAll("'", "\\'")}')">Supprimer</button>` : ''}
                <button onclick="enqueueFolders(['${f.name.replaceAll("'", "\\'")}'])">Traiter M4B</button>
            </td>
        </tr>`;
    });
    if (!data.folders.length) fb.innerHTML = '<tr><td colspan="5" class="muted">Aucun dossier</td></tr>';

    data.archives.forEach(a => {
        ab.innerHTML += `<tr><td><input type="checkbox" name="archiveSel" value="${a.name}"></td><td>${a.name}</td><td>${fmtMb(a.size)}</td></tr>`;
    });
    if (!data.archives.length) ab.innerHTML = '<tr><td colspan="3" class="muted">Aucune archive</td></tr>';
}

async function extractSelected(){
    const archives = selectedValues('archiveSel');
    if (!archives.length) return alert('Sélectionner des archives');
    await api('/api/extract',{method:'POST', body: JSON.stringify({archives, delete_archive: document.getElementById('deleteArchiveAfter').checked})});
    await loadLibrary();
}

async function renameOne(folder){
    if (renameInProgress) return;
    setRenameBusy(true);
    try {
        await api('/api/rename',{method:'POST', body: JSON.stringify({folders:[folder]})});
        await loadLibrary();
    } finally {
        setRenameBusy(false);
    }
}
async function renameSelected(){
    if (renameInProgress) return;
    const folders = selectedValues('folderSel');
    if (!folders.length) return alert('Sélectionner des dossiers');
    setRenameBusy(true);
    try {
        await api('/api/rename',{method:'POST', body: JSON.stringify({folders})});
        await loadLibrary();
    } finally {
        setRenameBusy(false);
    }
}

async function ignoreOne(folder){
    await api('/api/ignore',{method:'POST', body: JSON.stringify({folder})});
    await loadLibrary();
}

async function deleteSuspectFolder(folder){
    if (!confirm(`Supprimer définitivement le dossier suspect "${folder}" ?`)) return;
    await api('/api/folder/delete',{method:'POST', body: JSON.stringify({folder})});
    await loadLibrary();
}

async function enqueueFolders(folders){
    await api('/api/jobs/enqueue',{method:'POST', body: JSON.stringify({folders})});
    loadJobs();
}
async function enqueueSelected(){
    const folders = selectedValues('folderSel');
    if (!folders.length) return alert('Sélectionner des dossiers');
    await enqueueFolders(folders);
}

function renderJobs(containerId, jobs, withActions=false){
    const c = document.getElementById(containerId);
    if (!jobs.length) { c.innerHTML = '<p class="muted">Vide</p>'; return; }
    c.innerHTML = jobs.map(j => `<div class="row" style="justify-content:space-between;border-bottom:1px solid var(--border);padding:8px 0;">
        <div>
          <strong>${j.folder}</strong> <span class="pill">${j.stage}</span> ${j.error ? `<span class="muted">(${j.error})</span>`:''}
          <div class="muted">Progression: ${j.progress}%</div>
          ${j.output_file ? `<audio controls src="/api/stream/${j.output_file}"></audio>` : ''}
        </div>
        <div class="row">
          ${withActions ? `<button class="secondary" onclick="markReview('${j.id}','delete')">Mettre en attente suppression</button>
          <button class="secondary" onclick="markReview('${j.id}','reprocess')">Mettre en attente retraitement</button>` : ''}
        </div>
      </div>`).join('');
}

async function loadJobs(){
    const data = await api('/api/jobs');
    renderJobs('pendingList', data.pending);
    renderJobs('runningList', data.running);
    renderJobs('doneList', data.done, true);

    const review = document.getElementById('reviewList');
    if (!data.review.length) review.innerHTML = '<p class="muted">Aucune entrée.</p>';
    else review.innerHTML = data.review.map(r => `<div class="row" style="justify-content:space-between;border-bottom:1px solid var(--border);padding:8px 0;">
        <div><strong>${r.folder}</strong> - action: ${r.action}</div>
        <div class="row">
            ${r.action === 'reprocess' ? `<button onclick="enqueueFolders(['${r.folder.replaceAll("'", "\\'")}'])">Retraiter</button>`:''}
            <button class="danger" onclick="clearReview('${r.folder.replaceAll("'", "\\'")}')">Retirer de la liste</button>
        </div>
    </div>`).join('');
}

async function markReview(jobId, action){
    await api('/api/jobs/review',{method:'POST', body: JSON.stringify({job_id: jobId, action})});
    loadJobs();
}

async function clearReview(folder){
    await api('/api/review/clear',{method:'POST', body: JSON.stringify({folder})});
    loadJobs();
}

async function loadConfig(){
    const c = await api('/api/config');
    cfgBitrate.value = c.bitrate; cfgRate.value = c.sample_rate; cfgMode.value = c.processing_mode;
    cfgGpu.checked = c.enable_gpu; cfgLoud.checked = c.enable_loudnorm; cfgComp.checked = c.enable_compressor;
    cfgAutoExtract.checked = c.auto_extract_archives;
}

async function saveConfig(){
    await api('/api/config',{method:'POST', body: JSON.stringify({
        bitrate: cfgBitrate.value,
        sample_rate: parseInt(cfgRate.value,10),
        processing_mode: cfgMode.value,
        enable_gpu: cfgGpu.checked,
        enable_loudnorm: cfgLoud.checked,
        enable_compressor: cfgComp.checked,
        auto_extract_archives: cfgAutoExtract.checked
    })});
    alert('Configuration sauvegardée');
}

function setupTabs(){
    document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`page-${btn.dataset.page}`).classList.add('active');
    }));
}

function setupTheme(){
    const val = localStorage.getItem('theme') || 'light';
    if (val === 'dark') { document.body.classList.add('dark'); themeSwitch.checked = true; }
    themeSwitch.addEventListener('change', () => {
        document.body.classList.toggle('dark', themeSwitch.checked);
        localStorage.setItem('theme', themeSwitch.checked ? 'dark' : 'light');
    });
}

setupTabs();
setupTheme();
loadLibrary();
loadJobs();
loadConfig();
setInterval(loadJobs, 5000);
</script>
</body>
</html>
