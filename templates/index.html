<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Manager - Interface Web</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        .progress-bar {
            transition: width 0.3s ease;
        }
        .file-item:hover {
            transform: translateX(4px);
            transition: transform 0.2s ease;
        }
        .status-indicator {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-headphones text-3xl"></i>
                    <div>
                        <h1 class="text-2xl font-bold">Audiobook Manager</h1>
                        <p class="text-sm opacity-90">Conversion et gestion d'audiobooks</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <div class="text-sm opacity-90">Statut actuel</div>
                        <div id="status-text" class="font-semibold">Prêt</div>
                    </div>
                    <div id="status-indicator" class="w-3 h-3 bg-green-400 rounded-full"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Progress Section -->
        <div id="progress-section" class="hidden mb-8">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold">Conversion en cours</h3>
                    <button id="stop-btn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition">
                        <i class="fas fa-stop mr-2"></i>Arrêter
                    </button>
                </div>
                
                <div class="mb-4">
                    <div class="flex justify-between text-sm text-gray-600 mb-1">
                        <span id="current-file">Fichier: </span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div id="progress-bar" class="progress-bar bg-blue-500 h-3 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div class="bg-gray-50 rounded p-3">
                        <div class="text-2xl font-bold text-blue-600" id="processed-count">0</div>
                        <div class="text-sm text-gray-600">Fichiers traités</div>
                    </div>
                    <div class="bg-gray-50 rounded p-3">
                        <div class="text-2xl font-bold text-green-600" id="elapsed-time">00:00</div>
                        <div class="text-sm text-gray-600">Temps écoulé</div>
                    </div>
                    <div class="bg-gray-50 rounded p-3">
                        <div class="text-2xl font-bold text-purple-600" id="estimated-time">--:--</div>
                        <div class="text-sm text-gray-600">Temps estimé</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h3 class="text-lg font-semibold mb-4">Options de conversion</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Bitrate audio</label>
                    <select id="bitrate" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="64k">64k (Economique)</option>
                        <option value="96k">96k (Standard)</option>
                        <option value="128k" selected>128k (Haute qualité)</option>
                        <option value="192k">192k (Premium)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Échantillonnage</label>
                    <select id="samplerate" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="22050">22050 Hz</option>
                        <option value="44100" selected>44100 Hz</option>
                        <option value="48000">48000 Hz</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Options avancées</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" id="no-gpu" class="mr-2">
                            <span class="text-sm">Désactiver GPU</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="no-normalization" class="mr-2">
                            <span class="text-sm">Pas de normalisation</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="no-compression" class="mr-2">
                            <span class="text-sm">Pas de compression</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Files Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Source Files -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center">
                    <i class="fas fa-folder-open mr-2 text-blue-500"></i>
                    Fichiers source
                </h3>
                <div id="source-files" class="space-y-2 max-h-96 overflow-y-auto">
                    <!-- Files will be loaded here -->
                </div>
            </div>

            <!-- Output Files -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center">
                    <i class="fas fa-check-circle mr-2 text-green-500"></i>
                    Fichiers convertis
                </h3>
                <div id="output-files" class="space-y-2 max-h-96 overflow-y-auto">
                    <!-- Files will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-sm opacity-75">Audiobook Manager © 2024 - Conversion haute qualité d'audiobooks</p>
        </div>
    </footer>

    <script>
        // WebSocket connection
        const socket = io();
        let currentStatus = 'idle';
        let startTime = null;

        // DOM elements
        const statusText = document.getElementById('status-text');
        const statusIndicator = document.getElementById('status-indicator');
        const progressSection = document.getElementById('progress-section');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const currentFile = document.getElementById('current-file');
        const processedCount = document.getElementById('processed-count');
        const elapsedTime = document.getElementById('elapsed-time');
        const estimatedTime = document.getElementById('estimated-time');

        // Update status
        function updateStatus(status) {
            currentStatus = status.status;
            
            switch(status.status) {
                case 'idle':
                    statusText.textContent = 'Prêt';
                    statusIndicator.className = 'w-3 h-3 bg-green-400 rounded-full';
                    progressSection.classList.add('hidden');
                    break;
                case 'processing':
                    statusText.textContent = 'Conversion en cours';
                    statusIndicator.className = 'w-3 h-3 bg-blue-400 rounded-full status-indicator';
                    progressSection.classList.remove('hidden');
                    startTime = status.start_time;
                    break;
                case 'completed':
                    statusText.textContent = 'Terminé';
                    statusIndicator.className = 'w-3 h-3 bg-green-400 rounded-full';
                    setTimeout(() => {
                        progressSection.classList.add('hidden');
                        loadOutputFiles();
                    }, 3000);
                    break;
                case 'error':
                    statusText.textContent = 'Erreur';
                    statusIndicator.className = 'w-3 h-3 bg-red-400 rounded-full';
                    alert('Erreur de conversion: ' + status.error);
                    progressSection.classList.add('hidden');
                    break;
                case 'stopped':
                    statusText.textContent = 'Arrêté';
                    statusIndicator.className = 'w-3 h-3 bg-yellow-400 rounded-full';
                    progressSection.classList.add('hidden');
                    break;
            }
            
            // Update progress
            if (status.progress !== undefined) {
                progressBar.style.width = status.progress + '%';
                progressPercent.textContent = Math.round(status.progress) + '%';
            }
            
            if (status.current_file) {
                currentFile.textContent = 'Fichier: ' + status.current_file;
            }
            
            if (status.processed_files !== undefined) {
                processedCount.textContent = status.processed_files;
            }
            
            // Update time
            if (startTime) {
                const elapsed = Math.floor((Date.now() / 1000) - startTime);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                elapsedTime.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        // Load files
        async function loadSourceFiles() {
            try {
                const response = await fetch('/api/files');
                const files = await response.json();
                
                const container = document.getElementById('source-files');
                container.innerHTML = '';
                
                files.forEach(file => {
                    const fileDiv = document.createElement('div');
                    fileDiv.className = 'file-item bg-gray-50 rounded p-3 hover:bg-gray-100 cursor-pointer transition';
                    
                    const icon = file.type === 'folder' ? 'fa-folder' : 'fa-file-audio';
                    const size = (file.size / 1024 / 1024).toFixed(1);
                    const audioInfo = file.audio_count ? ` (${file.audio_count} fichiers)` : '';
                    
                    fileDiv.innerHTML = `
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <i class="fas ${icon} mr-3 text-blue-500"></i>
                                <div>
                                    <div class="font-medium">${file.name}</div>
                                    <div class="text-sm text-gray-500">${size} MB${audioInfo}</div>
                                </div>
                            </div>
                            <button onclick="convertFile('${file.name}')" class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600 transition">
                                <i class="fas fa-play mr-1"></i>Convertir
                            </button>
                        </div>
                    `;
                    
                    container.appendChild(fileDiv);
                });
            } catch (error) {
                console.error('Error loading source files:', error);
            }
        }

        async function loadOutputFiles() {
            try {
                const response = await fetch('/api/outputs');
                const files = await response.json();
                
                const container = document.getElementById('output-files');
                container.innerHTML = '';
                
                files.forEach(file => {
                    const fileDiv = document.createElement('div');
                    fileDiv.className = 'file-item bg-gray-50 rounded p-3 hover:bg-gray-100 transition';
                    
                    const size = (file.size / 1024 / 1024).toFixed(1);
                    const date = new Date(file.created * 1000).toLocaleString();
                    
                    fileDiv.innerHTML = `
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <i class="fas fa-check-circle mr-3 text-green-500"></i>
                                <div>
                                    <div class="font-medium">${file.name}</div>
                                    <div class="text-sm text-gray-500">${size} MB - ${date}</div>
                                </div>
                            </div>
                            <button onclick="downloadFile('${file.name}')" class="bg-green-500 text-white px-3 py-1 rounded text-sm hover:bg-green-600 transition">
                                <i class="fas fa-download mr-1"></i>Télécharger
                            </button>
                        </div>
                    `;
                    
                    container.appendChild(fileDiv);
                });
            } catch (error) {
                console.error('Error loading output files:', error);
            }
        }

        // Convert file
        async function convertFile(filename) {
            if (currentStatus === 'processing') {
                alert('Une conversion est déjà en cours');
                return;
            }
            
            const options = {
                bitrate: document.getElementById('bitrate').value,
                samplerate: parseInt(document.getElementById('samplerate').value),
                no_gpu: document.getElementById('no-gpu').checked,
                no_normalization: document.getElementById('no-normalization').checked,
                no_compression: document.getElementById('no-compression').checked
            };
            
            try {
                const response = await fetch('/api/convert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filename: filename,
                        options: options
                    })
                });
                
                if (response.ok) {
                    console.log('Conversion started');
                } else {
                    const error = await response.json();
                    alert('Erreur: ' + error.error);
                }
            } catch (error) {
                console.error('Error starting conversion:', error);
                alert('Erreur lors du démarrage de la conversion');
            }
        }

        // Download file
        function downloadFile(filename) {
            window.open(`/api/download/${filename}`, '_blank');
        }

        // Stop conversion
        document.getElementById('stop-btn').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/stop', { method: 'POST' });
                if (response.ok) {
                    console.log('Conversion stopped');
                }
            } catch (error) {
                console.error('Error stopping conversion:', error);
            }
        });

        // WebSocket events
        socket.on('connect', () => {
            console.log('Connected to server');
            loadSourceFiles();
            loadOutputFiles();
        });

        socket.on('status_update', updateStatus);

        socket.on('conversion_complete', (data) => {
            console.log('Conversion complete:', data);
            updateStatus({ status: 'completed' });
        });

        socket.on('conversion_error', (data) => {
            console.log('Conversion error:', data);
            updateStatus({ status: 'error', error: data.error });
        });

        socket.on('conversion_stopped', () => {
            console.log('Conversion stopped');
            updateStatus({ status: 'stopped' });
        });

        // Auto-refresh
        setInterval(() => {
            if (currentStatus === 'idle') {
                loadSourceFiles();
                loadOutputFiles();
            }
        }, 5000);

        // Initial load
        loadSourceFiles();
        loadOutputFiles();
    </script>
</body>
</html>
